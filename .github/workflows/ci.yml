name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest (fast suite, no stress, no integration)
        run: |
          pytest tests --ignore=tests/stress -q -m "not integration"

  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x"]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      # Audit only the runtime requirements file.  --strict turns any
      # known vulnerability into a non-zero exit.  Dev-only deps are
      # excluded because they never ship in the container image.
      - name: Audit requirements.txt
        run: pip-audit -r requirements.txt --strict

  npm-audit:
    name: npm audit (frontend prod deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `npm audit --omit=dev` excludes the build-only toolchain
      # (vite, @vitejs/plugin-react, @types/*) which never ships to
      # the user.  --audit-level=high fails only on high/critical
      # advisories, matching what we'd actually patch on a hotfix.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  trivy:
    name: Trivy (Dockerfile + filesystem scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dockerfile / IaC misconfig scan — catches issues like running
      # as root, missing HEALTHCHECK, ADD over COPY, etc.  We scope to
      # the docker/ directory so noise from frontend/node_modules in
      # PR builds doesn't drown out real findings.
      - name: Trivy config scan (Dockerfile)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: docker
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: docker/.trivyignore

      # Filesystem secret scan — catches accidentally committed API
      # keys, .env files, tokens, etc.  Skips dependency lockfiles
      # which Trivy already covers under `vuln` mode (we run pip-audit
      # / npm audit separately for that).
      - name: Trivy filesystem secret scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: frontend/node_modules,.venv
