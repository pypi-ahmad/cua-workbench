<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CUA Workbench Architecture</title>
  <desc id="desc">High-level architecture showing the browser client, React frontend, FastAPI backend, Docker sandbox, and execution engines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <linearGradient id="hostGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="containerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="serviceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1440" height="960" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .panelTitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .panelTitleInv { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .boxTitle { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .boxBody { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .boxBodyInv { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1; }
      .chip { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .chipInv { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #F8FAFC; }
      .label { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #64748B; }
    </style>
  </defs>

  <rect width="1400" height="920" rx="28" fill="url(#bg)"/>
  <rect x="40" y="34" width="1320" height="852" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>

  <text x="88" y="98" class="title">CUA Workbench Architecture</text>
  <text x="88" y="126" class="subtitle">A host-side control plane drives a Linux desktop and browser sandbox in Docker, then streams status back to the web UI.</text>

  <rect x="88" y="170" width="560" height="660" rx="28" fill="url(#hostGrad)"/>
  <text x="122" y="214" class="panelTitleInv">Host Control Plane</text>
  <text x="122" y="238" class="boxBodyInv">Runs on Windows, macOS, or Linux. Exposes the API, orchestrates sessions, and serves the React workbench.</text>

  <rect x="122" y="274" width="492" height="128" rx="22" fill="url(#serviceGrad)"/>
  <text x="150" y="314" class="boxTitle">Browser Client</text>
  <text x="150" y="338" class="boxBody">User opens the workbench UI, receives WebSocket events, and can switch between screenshots and noVNC.</text>
  <rect x="462" y="294" width="124" height="28" rx="14" fill="#DBEAFE"/>
  <text x="492" y="313" text-anchor="middle" class="chip">Port 3000</text>

  <rect x="122" y="428" width="492" height="162" rx="22" fill="url(#serviceGrad)"/>
  <text x="150" y="468" class="boxTitle">React + Vite Frontend</text>
  <text x="150" y="492" class="boxBody">Workbench page, provider/model selectors, engine target controls, log timeline, screen viewer, and proxy routes for API, WebSocket, and VNC.</text>
  <text x="150" y="522" class="label">Key files</text>
  <text x="150" y="544" class="small">frontend/src/pages/Workbench.jsx · frontend/src/api.js · frontend/src/hooks/useWebSocket.js</text>

  <rect x="122" y="616" width="492" height="180" rx="22" fill="url(#serviceGrad)"/>
  <text x="150" y="656" class="boxTitle">FastAPI Backend</text>
  <text x="150" y="680" class="boxBody">Validates engine/provider/model choices, resolves API keys, manages Docker lifecycle, spawns AgentLoop sessions, and broadcasts live events.</text>
  <text x="150" y="710" class="label">Key services</text>
  <text x="150" y="732" class="small">backend/api/server.py · backend/agent/loop.py · backend/utils/docker_manager.py</text>
  <rect x="462" y="636" width="124" height="28" rx="14" fill="#CCFBF1"/>
  <text x="524" y="655" text-anchor="middle" class="chip">Port 8000</text>

  <rect x="752" y="170" width="560" height="660" rx="28" fill="url(#containerGrad)"/>
  <text x="786" y="214" class="panelTitleInv">Docker Sandbox</text>
  <text x="786" y="238" class="boxBodyInv">Ubuntu 24.04 container with XFCE, Xvfb, VNC, Playwright MCP, and the internal agent service.</text>

  <rect x="786" y="274" width="492" height="126" rx="22" fill="#111827" stroke="#334155"/>
  <text x="814" y="314" class="panelTitleInv">Desktop Runtime</text>
  <text x="814" y="338" class="boxBodyInv">Xvfb + XFCE create the visible Linux workspace. x11vnc and noVNC expose an interactive session to the browser.</text>
  <text x="814" y="364" class="small">Ports 5900 and 6080, bound to 127.0.0.1 only</text>

  <rect x="786" y="428" width="232" height="164" rx="22" fill="#111827" stroke="#334155"/>
  <text x="814" y="468" class="panelTitleInv">agent_service.py</text>
  <text x="814" y="492" class="boxBodyInv">Receives action and screenshot requests from the backend and executes them in browser or desktop mode.</text>
  <rect x="846" y="540" width="112" height="26" rx="13" fill="#1D4ED8"/>
  <text x="902" y="558" text-anchor="middle" class="chipInv">Port 9222</text>

  <rect x="1046" y="428" width="232" height="164" rx="22" fill="#111827" stroke="#334155"/>
  <text x="1074" y="468" class="panelTitleInv">Playwright MCP</text>
  <text x="1074" y="492" class="boxBodyInv">Semantic browser automation surface for accessibility-tree navigation, tool calls, snapshots, and browser-scoped control.</text>
  <rect x="1106" y="540" width="112" height="26" rx="13" fill="#0F766E"/>
  <text x="1162" y="558" text-anchor="middle" class="chipInv">Port 8931</text>

  <rect x="786" y="620" width="492" height="176" rx="22" fill="#111827" stroke="#334155"/>
  <text x="814" y="660" class="panelTitleInv">Execution Engines</text>
  <text x="814" y="686" class="boxBodyInv">Playwright MCP for browser semantics, Omni Accessibility for platform accessibility trees, and Computer Use for native model-driven browser or desktop control.</text>
  <text x="814" y="716" class="small">Computer Use uses Playwright CDP in browser mode and xdotool + scrot in desktop mode.</text>
  <text x="814" y="744" class="small">Container limits: 4 GB memory, 2 CPUs, 2 GB shared memory, no-new-privileges.</text>

  <path d="M614 338H738" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="676" y="324" text-anchor="middle" class="label">REST, WS, VNC proxy</text>

  <path d="M614 506H738" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="676" y="492" text-anchor="middle" class="label">Session control</text>

  <path d="M614 706H738" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="676" y="692" text-anchor="middle" class="label">Actions and screenshots</text>

  <path d="M902 592V620" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1162 592V620" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1032" y="610" text-anchor="middle" class="small">Engine dispatch inside sandbox</text>

  <rect x="88" y="842" width="1240" height="20" rx="10" fill="#E2E8F0"/>
  <rect x="88" y="842" width="330" height="20" rx="10" fill="#1D4ED8"/>
  <rect x="418" y="842" width="324" height="20" rx="0" fill="#0F766E"/>
  <rect x="742" y="842" width="586" height="20" rx="10" fill="#111827"/>
  <text x="252" y="857" text-anchor="middle" class="chipInv">UI and client connections</text>
  <text x="580" y="857" text-anchor="middle" class="chipInv">Backend orchestration</text>
  <text x="1035" y="857" text-anchor="middle" class="chipInv">Sandboxed execution and observation</text>
</svg>