<svg width="1400" height="940" viewBox="0 0 1400 940" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CUA Workbench Component Relationships</title>
  <desc id="desc">Relationship map between frontend, API server, agent loop, model router, execution engines, and container services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F3F4F6"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1440" height="980" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .group { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .cardTitle { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .body { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .minor { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #64748B; }
      .edge { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1400" height="940" rx="28" fill="url(#bg)"/>
  <rect x="36" y="34" width="1328" height="872" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="84" y="96" class="title">Component Relationship Map</text>
  <text x="84" y="124" class="subtitle">The repository is organized around a thin UI, a validation and orchestration API, and execution engines that target a Linux sandbox or local accessibility APIs.</text>

  <rect x="84" y="166" width="1232" height="220" rx="28" fill="#EEF6FF"/>
  <text x="116" y="208" class="group">Presentation Layer</text>
  <rect x="116" y="234" width="268" height="118" rx="22" fill="#FFFFFF" stroke="#BFDBFE"/>
  <text x="144" y="272" class="cardTitle">Workbench UI</text>
  <text x="144" y="296" class="body">Task form, engine and model selectors, timeline, logs, and session controls.</text>
  <text x="144" y="322" class="minor">frontend/src/pages/Workbench.jsx</text>
  <rect x="430" y="234" width="268" height="118" rx="22" fill="#FFFFFF" stroke="#BFDBFE"/>
  <text x="458" y="272" class="cardTitle">API client + hooks</text>
  <text x="458" y="296" class="body">Fetch wrappers, WebSocket event handling, container polling, and screen state updates.</text>
  <text x="458" y="322" class="minor">frontend/src/api.js · frontend/src/hooks/useWebSocket.js</text>
  <rect x="744" y="234" width="268" height="118" rx="22" fill="#FFFFFF" stroke="#BFDBFE"/>
  <text x="772" y="272" class="cardTitle">Screen viewers</text>
  <text x="772" y="296" class="body">noVNC iframe for interactive control plus screenshot fallback rendering.</text>
  <text x="772" y="322" class="minor">frontend/src/components/ScreenView.jsx</text>
  <rect x="1058" y="234" width="226" height="118" rx="22" fill="#FFFFFF" stroke="#BFDBFE"/>
  <text x="1086" y="272" class="cardTitle">Optional video path</text>
  <text x="1086" y="296" class="body">WebRTC offer endpoint can stream X11 frames when aiortc and av are installed.</text>
  <text x="1086" y="322" class="minor">backend/streaming/webrtc_server.py</text>

  <rect x="84" y="420" width="1232" height="236" rx="28" fill="#ECFDF5"/>
  <text x="116" y="462" class="group">Backend Control Plane</text>
  <rect x="116" y="488" width="252" height="132" rx="22" fill="#FFFFFF" stroke="#A7F3D0"/>
  <text x="144" y="526" class="cardTitle">FastAPI server</text>
  <text x="144" y="550" class="body">REST endpoints, WebSocket broadcast, CORS, and session bookkeeping.</text>
  <text x="144" y="578" class="minor">backend/api/server.py</text>
  <rect x="398" y="488" width="252" height="132" rx="22" fill="#FFFFFF" stroke="#A7F3D0"/>
  <text x="426" y="526" class="cardTitle">Config and policy</text>
  <text x="426" y="550" class="body">Environment loading, API key resolution, model allowlist, engine registry, and validation contracts.</text>
  <text x="426" y="578" class="minor">backend/config.py · backend/allowed_models.json · backend/engine_capabilities.json</text>
  <rect x="680" y="488" width="252" height="132" rx="22" fill="#FFFFFF" stroke="#A7F3D0"/>
  <text x="708" y="526" class="cardTitle">AgentLoop orchestration</text>
  <text x="708" y="550" class="body">Perceive-think-act loop with duplicate detection, retries, and structured logs.</text>
  <text x="708" y="578" class="minor">backend/agent/loop.py</text>
  <rect x="962" y="488" width="322" height="132" rx="22" fill="#FFFFFF" stroke="#A7F3D0"/>
  <text x="990" y="526" class="cardTitle">Model routing and action executor</text>
  <text x="990" y="550" class="body">Routes to Gemini or Claude, normalizes actions, and dispatches to the selected engine without fallback switching.</text>
  <text x="990" y="578" class="minor">backend/agent/model_router.py · backend/agent/executor.py</text>

  <rect x="84" y="690" width="1232" height="180" rx="28" fill="#FFF7ED"/>
  <text x="116" y="732" class="group">Execution Layer</text>
  <rect x="116" y="758" width="260" height="82" rx="22" fill="#FFFFFF" stroke="#FCD34D"/>
  <text x="144" y="792" class="cardTitle">Playwright MCP engine</text>
  <text x="144" y="816" class="minor">Semantic browser actions over MCP JSON-RPC</text>
  <rect x="412" y="758" width="260" height="82" rx="22" fill="#FFFFFF" stroke="#FCD34D"/>
  <text x="440" y="792" class="cardTitle">Omni Accessibility engine</text>
  <text x="440" y="816" class="minor">AT-SPI, UIA, or JXA-backed semantic desktop automation</text>
  <rect x="708" y="758" width="260" height="82" rx="22" fill="#FFFFFF" stroke="#FCD34D"/>
  <text x="736" y="792" class="cardTitle">Computer Use engine</text>
  <text x="736" y="816" class="minor">Native model tool protocol for browser or desktop execution</text>
  <rect x="1004" y="758" width="280" height="82" rx="22" fill="#FFFFFF" stroke="#FCD34D"/>
  <text x="1032" y="792" class="cardTitle">Docker and agent service</text>
  <text x="1032" y="816" class="minor">Container lifecycle, screenshot capture, xdotool, scrot, noVNC, and Playwright runtime</text>

  <path d="M384 292H430" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="406" y="282" text-anchor="middle" class="edge">HTTP</text>
  <path d="M698 292H744" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="721" y="282" text-anchor="middle" class="edge">WS / VNC</text>
  <path d="M1012 292H1058" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1035" y="282" text-anchor="middle" class="edge">Offer / answer</text>

  <path d="M242 620V690" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M524 620V690" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M806 620V690" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1124 620V690" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M810 620V650C810 668 824 682 842 682H1038" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="944" y="672" text-anchor="middle" class="edge">actions / screenshots</text>

  <path d="M1104 488V386C1104 362 1084 342 1060 342H1012" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="1082" y="398" text-anchor="middle" class="edge">event stream</text>
</svg>