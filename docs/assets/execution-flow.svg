<svg width="1400" height="960" viewBox="0 0 1400 960" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CUA Workbench Execution Flow</title>
  <desc id="desc">Request and execution flow from the user request to validation, agent loop perception, model reasoning, action execution, streaming, and completion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF7"/>
      <stop offset="1" stop-color="#F5F7FB"/>
    </linearGradient>
    <linearGradient id="stepA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="stepB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="stepC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="stepD" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1440" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .stepNum { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .stepTitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .body { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .minor { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #64748B; }
      .lane { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .badge { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1400" height="960" rx="28" fill="url(#bg)"/>
  <rect x="36" y="34" width="1328" height="892" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>

  <text x="84" y="96" class="title">Request and Execution Flow</text>
  <text x="84" y="124" class="subtitle">The workbench validates a session request, runs the perceive-think-act loop, streams progress, and terminates conservatively when conditions require it.</text>

  <line x1="160" y1="182" x2="160" y2="866" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="430" y1="182" x2="430" y2="866" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="700" y1="182" x2="700" y2="866" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="970" y1="182" x2="970" y2="866" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="1240" y1="182" x2="1240" y2="866" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 8"/>

  <text x="160" y="170" text-anchor="middle" class="lane">User / UI</text>
  <text x="430" y="170" text-anchor="middle" class="lane">API Layer</text>
  <text x="700" y="170" text-anchor="middle" class="lane">Agent Loop</text>
  <text x="970" y="170" text-anchor="middle" class="lane">Model Provider</text>
  <text x="1240" y="170" text-anchor="middle" class="lane">Execution Runtime</text>

  <rect x="90" y="214" width="280" height="102" rx="22" fill="#EFF6FF"/>
  <circle cx="126" cy="248" r="22" fill="url(#stepA)"/>
  <text x="126" y="255" text-anchor="middle" class="stepNum">1</text>
  <text x="160" y="246" class="stepTitle">Start task</text>
  <text x="160" y="270" class="body">User submits task, provider, model, engine, target, and max step budget from the workbench.</text>

  <path d="M370 264H400" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="360" y="214" width="280" height="148" rx="22" fill="#F8FAFC" stroke="#BFDBFE"/>
  <circle cx="396" cy="248" r="22" fill="url(#stepA)"/>
  <text x="396" y="255" text-anchor="middle" class="stepNum">2</text>
  <text x="430" y="246" class="stepTitle">Validate request</text>
  <text x="430" y="270" class="body">Checks engine/provider/model allowlists, resolves API keys, rate limits starts, and rejects unsupported target combinations.</text>
  <text x="430" y="300" class="minor">Guardrails: 10 starts/min, 3 concurrent sessions, Computer Use requires docker target.</text>

  <path d="M640 288H670" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="630" y="214" width="280" height="148" rx="22" fill="#ECFEFF" stroke="#99F6E4"/>
  <circle cx="666" cy="248" r="22" fill="url(#stepB)"/>
  <text x="666" y="255" text-anchor="middle" class="stepNum">3</text>
  <text x="700" y="246" class="stepTitle">Create session</text>
  <text x="700" y="270" class="body">FastAPI spawns AgentLoop, stores it in memory, and returns a session id while background execution begins.</text>
  <text x="700" y="300" class="minor">State is ephemeral and lost on backend restart.</text>

  <path d="M700 362V414" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="630" y="430" width="280" height="154" rx="22" fill="#ECFEFF" stroke="#99F6E4"/>
  <circle cx="666" cy="464" r="22" fill="url(#stepB)"/>
  <text x="666" y="471" text-anchor="middle" class="stepNum">4</text>
  <text x="700" y="462" class="stepTitle">Perceive current state</text>
  <text x="700" y="486" class="body">Captures a screenshot or obtains an accessibility snapshot depending on engine and mode.</text>
  <text x="700" y="516" class="minor">Source: agent service screenshot endpoint, scrot fallback, or MCP snapshot tooling.</text>

  <path d="M910 506H940" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="900" y="430" width="280" height="170" rx="22" fill="#FFFBEB" stroke="#FCD34D"/>
  <circle cx="936" cy="464" r="22" fill="url(#stepC)"/>
  <text x="936" y="471" text-anchor="middle" class="stepNum">5</text>
  <text x="970" y="462" class="stepTitle">Query the selected model</text>
  <text x="970" y="486" class="body">Routes to Gemini or Claude, sends the task plus recent context, and asks for the next structured action.</text>
  <text x="970" y="516" class="minor">Allowed models come from backend/allowed_models.json.</text>

  <path d="M1040 600V652C1040 674 1022 692 1000 692H740" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="630" y="642" width="280" height="170" rx="22" fill="#F5F3FF" stroke="#C4B5FD"/>
  <circle cx="666" cy="676" r="22" fill="url(#stepD)"/>
  <text x="666" y="683" text-anchor="middle" class="stepNum">6</text>
  <text x="700" y="674" class="stepTitle">Parse and police the action</text>
  <text x="700" y="698" class="body">Normalizes aliases, validates coordinates and text, checks engine support, and decides whether to execute, retry, or terminate.</text>
  <text x="700" y="728" class="minor">Also tracks duplicate actions, duplicate results, and consecutive failures.</text>

  <path d="M910 728H1180" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="1100" y="642" width="220" height="170" rx="22" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="1136" cy="676" r="22" fill="url(#stepA)"/>
  <text x="1136" y="683" text-anchor="middle" class="stepNum">7</text>
  <text x="1170" y="674" class="stepTitle">Execute in runtime</text>
  <text x="1170" y="698" class="body">Dispatches to Playwright MCP, Omni Accessibility, or Computer Use browser/desktop executors.</text>
  <text x="1170" y="728" class="minor">Browser actions use MCP or Playwright; desktop actions use accessibility APIs or xdotool.</text>

  <path d="M1180 812H430" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M430 812V616" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="360" y="574" width="220" height="126" rx="22" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="390" y="614" class="stepTitle">Stream progress</text>
  <text x="390" y="638" class="body">Broadcasts screenshots, step records, logs, and finish events over WebSocket.</text>
  <text x="390" y="666" class="minor">Optional WebRTC video and proxied noVNC are available separately.</text>

  <rect x="88" y="848" width="1240" height="52" rx="18" fill="#0F172A"/>
  <text x="120" y="879" class="body" fill="#E2E8F0">Termination conditions: done or error actions, user stop, max steps, repeated stuck detection, or explicit backend cancellation.</text>
  <rect x="1018" y="860" width="126" height="26" rx="13" fill="#DBEAFE"/>
  <text x="1081" y="878" text-anchor="middle" class="badge">Perceive</text>
  <rect x="1158" y="860" width="126" height="26" rx="13" fill="#D1FAE5"/>
  <text x="1221" y="878" text-anchor="middle" class="badge">Think</text>
  <rect x="1298" y="860" width="0" height="0" rx="13" fill="#FDE68A"/>
  <rect x="1294" y="860" width="126" height="26" rx="13" fill="#FDE68A"/>
  <text x="1357" y="878" text-anchor="middle" class="badge">Act</text>
</svg>