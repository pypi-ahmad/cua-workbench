[pytest]
# Register custom markers so pytest doesn't emit PytestUnknownMarkWarning.
# Run only the fast suite:  pytest tests --ignore=tests/stress
# Run stress separately:    pytest tests/stress
markers =
    integration: tests that require a running Docker container, network,
                 or real provider credentials.  Skipped in CI by default.
    stress:      long-running stress / soak / load scenarios.

# Default asyncio mode — matches what pytest-asyncio 0.23+ expects.
asyncio_mode = strict
