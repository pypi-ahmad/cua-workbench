[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = False

# Third-party packages without published stubs. Mypy cannot type-check
# their internals so we only ignore the missing-stubs error for these
# modules; type errors against our own usage of them are still reported
# as "Any" propagation errors when relevant.
[mypy-gi]
ignore_missing_imports = True

[mypy-gi.repository]
ignore_missing_imports = True

[mypy-av]
ignore_missing_imports = True

[mypy-aiortc]
ignore_missing_imports = True

[mypy-playwright.sync_api]
ignore_missing_imports = True

[mypy-playwright.async_api]
ignore_missing_imports = True
